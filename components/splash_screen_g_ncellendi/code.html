<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İSTİKLAL | Portal</title>
<meta name="description" content="İstiklal Portal — Gamer matching platform loading screen">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   ZOZZO-FUSION SPLASH — Cosmic Void Edition v2
   Purple (#8B5CF6) + Cyan (#22D3EE) dual palette
   ═══════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}

/* ══════════════════════════════════════
   1. FULL VIEWPORT — COSMIC VOID BG
   ══════════════════════════════════════ */
body{
  width:100vw;height:100vh;overflow:hidden;
  background:linear-gradient(160deg,#030014 0%,#0a0d2c 35%,#1a063e 65%,#0c0522 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  font-family:'Outfit','Poppins',sans-serif;
  position:relative;
}

/* ── Black Entry Overlay (1s fade from absolute black) ── */
#black-overlay{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  animation:overlayFadeOut 1s ease-out 0.2s forwards;
}
@keyframes overlayFadeOut{
  to{opacity:0;pointer-events:none}
}

/* ── Subtle Map / Grid Silhouette ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(139,92,246,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(34,211,238,0.012) 1px,transparent 1px);
  background-size:55px 55px;
  pointer-events:none;
}

/* ── Ambient Dual Glow Orbs ── */
.ambient-orb{
  position:fixed;z-index:0;
  border-radius:50%;
  pointer-events:none;
  filter:blur(80px);
}
.ambient-orb.purple{
  width:500px;height:500px;
  top:40%;left:45%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 70%);
  animation:orbFloat1 8s ease-in-out infinite;
}
.ambient-orb.cyan{
  width:400px;height:400px;
  top:55%;left:55%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(34,211,238,0.08) 0%,transparent 70%);
  animation:orbFloat2 10s ease-in-out infinite;
}
@keyframes orbFloat1{
  0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-48%,-52%) scale(1.18)}
}
@keyframes orbFloat2{
  0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:0.9;transform:translate(-52%,-48%) scale(1.22)}
}

/* ── Particle Canvas ── */
#particle-canvas{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;
}

/* ══════════════════════════════════════
   2. CENTER CONTENT — Fade-in & Scale-up
   ══════════════════════════════════════ */
.nexus-center{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:36px;
  opacity:0;transform:scale(0.88);
  animation:contentReveal 0.9s cubic-bezier(.23,1.01,.32,1) 1s forwards;
}
@keyframes contentReveal{
  to{opacity:1;transform:scale(1)}
}

/* ══════════════════════════════════════
   3. NEXUS LOGO — Aetheric Ring System
   ══════════════════════════════════════ */
.logo-container{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  width:170px;height:170px;
}

/* ── Outer Aetheric Ring (Purple) ── */
.ring-outer{
  position:absolute;inset:-22px;
  border-radius:50%;
  border:2.5px solid transparent;
  background:conic-gradient(from 0deg,
    rgba(139,92,246,0.7),
    rgba(139,92,246,0.15),
    rgba(34,211,238,0.3),
    rgba(139,92,246,0.15),
    rgba(139,92,246,0.7)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:outerSpin 10s linear infinite, outerPulse 3.5s ease-in-out infinite;
}
@keyframes outerSpin{ to{transform:rotate(360deg)} }
@keyframes outerPulse{
  0%,100%{opacity:0.45;filter:drop-shadow(0 0 6px rgba(139,92,246,0.2))}
  50%{opacity:1;filter:drop-shadow(0 0 24px rgba(139,92,246,0.55))}
}

/* ── Middle Aetheric Ring (Cyan) ── */
.ring-mid{
  position:absolute;inset:-10px;
  border-radius:50%;
  border:1.5px solid transparent;
  background:conic-gradient(from 180deg,
    rgba(34,211,238,0.75),
    rgba(34,211,238,0.1),
    rgba(139,92,246,0.25),
    rgba(34,211,238,0.1),
    rgba(34,211,238,0.75)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:midSpin 7s linear infinite reverse, midPulse 2.8s ease-in-out infinite;
}
@keyframes midSpin{ to{transform:rotate(360deg)} }
@keyframes midPulse{
  0%,100%{opacity:0.4;filter:drop-shadow(0 0 4px rgba(34,211,238,0.15))}
  50%{opacity:1;filter:drop-shadow(0 0 20px rgba(34,211,238,0.5))}
}

/* ── Inner Halo Ring ── */
.ring-inner{
  position:absolute;inset:2px;
  border-radius:50%;
  border:1px solid transparent;
  background:conic-gradient(from 90deg,
    rgba(139,92,246,0.35),
    rgba(34,211,238,0.2),
    rgba(139,92,246,0.35),
    rgba(34,211,238,0.2)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:innerSpin 5s linear infinite, innerPulse 2s ease-in-out infinite;
}
@keyframes innerSpin{ to{transform:rotate(360deg)} }
@keyframes innerPulse{
  0%,100%{opacity:0.3;filter:drop-shadow(0 0 3px rgba(139,92,246,0.1))}
  50%{opacity:0.7;filter:drop-shadow(0 0 10px rgba(34,211,238,0.3))}
}

/* ── Core Circle (Logo body) ── */
.logo-core{
  width:140px;height:140px;border-radius:50%;
  background:linear-gradient(135deg,rgba(10,13,44,0.92),rgba(26,6,62,0.92));
  border:1px solid rgba(139,92,246,0.12);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  box-shadow:
    0 0 45px rgba(139,92,246,0.1),
    0 0 90px rgba(34,211,238,0.05),
    inset 0 0 35px rgba(0,0,0,0.5);
  animation:coreBreathe 2.6s ease-in-out infinite;
  position:relative;z-index:2;
}
@keyframes coreBreathe{
  0%,100%{
    transform:scale(1);
    box-shadow:0 0 45px rgba(139,92,246,0.1),0 0 90px rgba(34,211,238,0.05),inset 0 0 35px rgba(0,0,0,0.5);
  }
  50%{
    transform:scale(1.05);
    box-shadow:0 0 60px rgba(139,92,246,0.18),0 0 110px rgba(34,211,238,0.1),inset 0 0 35px rgba(0,0,0,0.4);
  }
}

.logo-icon{
  font-size:50px;
  background:linear-gradient(135deg,#8B5CF6,#22D3EE);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  font-variation-settings:'FILL' 1;
  filter:drop-shadow(0 0 14px rgba(139,92,246,0.5));
}
.logo-label{
  font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:700;
  letter-spacing:3.5px;
  background:linear-gradient(135deg,#8B5CF6 30%,#22D3EE 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ══════════════════════════════════════
   4. BRAND TITLE
   ══════════════════════════════════════ */
.brand-title{
  font-family:'Outfit',sans-serif;
  font-size:40px;font-weight:700;letter-spacing:-1.5px;
  background:linear-gradient(135deg,#93c5fd 0%,#8B5CF6 45%,#22D3EE 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-align:center;
  filter:drop-shadow(0 0 22px rgba(139,92,246,0.25));
  opacity:0;transform:translateY(18px);
  animation:textSlideUp 0.7s ease-out 1.3s forwards;
}
@keyframes textSlideUp{
  to{opacity:1;transform:translateY(0)}
}

/* ══════════════════════════════════════
   5. DYNAMIC TEXT BAND
   ══════════════════════════════════════ */
.text-section{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  opacity:0;transform:translateY(12px);
  animation:textSlideUp 0.6s ease-out 1.6s forwards;
}
.loading-title{
  font-family: 'Poppins', 'Outfit', sans-serif;
  font-size:15px;font-weight:600;
  color:rgba(226,226,232,0.72);
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.dynamic-text-container{
  height:22px;position:relative;overflow:hidden;
  min-width:290px;text-align:center;
}
.dynamic-text{
  font-family:'Poppins',sans-serif;
  font-size:13px;font-weight:500;
  letter-spacing:0.5px;
  position:absolute;width:100%;
  opacity:0;transform:translateY(8px);
  transition:all 0.5s cubic-bezier(.23,1.01,.32,1);
  background:linear-gradient(90deg,rgba(139,92,246,0.7),rgba(34,211,238,0.65));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.dynamic-text.active{
  opacity:1;transform:translateY(0);
}
.dynamic-text.exit{
  opacity:0;transform:translateY(-8px);
}

/* ══════════════════════════════════════
   6. LASER PROGRESS LINE
   ══════════════════════════════════════ */
.progress-section{
  width:260px;
  opacity:0;
  animation:textSlideUp 0.5s ease-out 1.9s forwards;
}
.laser-track{
  width:100%;height:2px;
  background:rgba(255,255,255,0.04);
  border-radius:2px;
  position:relative;overflow:visible;
}
.laser-fill{
  position:absolute;left:0;top:0;
  height:100%;width:0%;
  background:linear-gradient(90deg,rgba(139,92,246,0.25),#8B5CF6 60%,#22D3EE);
  border-radius:2px;
  box-shadow:0 0 8px rgba(139,92,246,0.4),0 0 20px rgba(34,211,238,0.2);
  transition:box-shadow 0.3s ease;
}
/* Glowing Laser Tip */
.laser-fill::after{
  content:'';position:absolute;
  right:-6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle,#22D3EE 0%,rgba(34,211,238,0.5) 35%,rgba(139,92,246,0.3) 60%,transparent 70%);
  box-shadow:
    0 0 8px #22D3EE,
    0 0 20px rgba(34,211,238,0.5),
    0 0 40px rgba(139,92,246,0.2);
  animation:tipGlow 1.2s ease-in-out infinite;
}
@keyframes tipGlow{
  0%,100%{opacity:1;transform:translateY(-50%) scale(1)}
  50%{opacity:0.6;transform:translateY(-50%) scale(1.7)}
}
/* Neon Blur Trail */
.laser-fill::before{
  content:'';position:absolute;inset:0;
  border-radius:2px;
  background:inherit;
  filter:blur(5px);
  opacity:0.65;
}

/* ── Percentage Counter ── */
.progress-pct{
  font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:600;
  color:rgba(34,211,238,0.4);
  text-align:right;
  margin-top:8px;
  letter-spacing:1px;
}

/* ══════════════════════════════════════
   7. EXIT — Portal Opening Animation
   ══════════════════════════════════════ */
/* Central white flash overlay */
#exit-flash{
  position:fixed;inset:0;z-index:9998;
  background:radial-gradient(circle at center,rgba(34,211,238,0.15),transparent 70%);
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
#exit-flash.active{
  opacity:1;
}
body.splash-exit .nexus-center{
  animation:exitPortal 0.8s cubic-bezier(.23,1.01,.32,1) forwards;
}
body.splash-exit #particle-canvas{
  animation:exitFade 0.8s ease-in forwards;
}
body.splash-exit .ambient-orb{
  animation:exitFade 0.8s ease-in forwards;
}
@keyframes exitPortal{
  0%{opacity:1;transform:scale(1)}
  60%{opacity:0.7;transform:scale(1.15)}
  100%{opacity:0;transform:scale(1.4);filter:blur(8px)}
}
@keyframes exitFade{
  to{opacity:0}
}

/* Final white-out overlay */
#exit-overlay{
  position:fixed;inset:0;z-index:10000;
  background:radial-gradient(ellipse at center,#0c0522,#030014);
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;
}
#exit-overlay.active{
  opacity:1;pointer-events:all;
}

/* ══════════════════════════════════════
   8. RESPONSIVE
   ══════════════════════════════════════ */
@media(max-width:480px){
  .brand-title{font-size:30px}
  .logo-container{width:140px;height:140px}
  .logo-core{width:115px;height:115px}
  .logo-icon{font-size:40px}
  .logo-label{font-size:11px;letter-spacing:2px}
  .progress-section{width:210px}
  .dynamic-text-container{min-width:240px}
  .ring-outer{inset:-18px}
  .ring-mid{inset:-8px}
}
</style>
</head>

<script>
/* ═══════════════════════════════════════
   GAMER PARTICLE SYSTEM — Multi-color
   ═══════════════════════════════════════ */
(function(){
  var canvas = document.getElementById('particle-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var PARTICLE_COUNT = 70;
  var colors = [
    'rgba(139,92,246,',    // purple
    'rgba(34,211,238,',    // cyan
    'rgba(96,165,250,',    // light blue
    'rgba(255,255,255,',   // white
    'rgba(167,139,250,',   // soft lavender
  ];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createParticle(){
    var colorBase = colors[Math.floor(Math.random()*colors.length)];
    return {
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*2.2+0.4,
      speedY: -(Math.random()*0.25+0.08),
      speedX: (Math.random()-0.5)*0.18,
      opacity: Math.random()*0.45+0.08,
      opacityDir: (Math.random()-0.5)*0.004,
      color: colorBase
    };
  }

  for(var i=0;i<PARTICLE_COUNT;i++){
    particles.push(createParticle());
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<particles.length;i++){
      var p = particles[i];
      p.x += p.speedX;
      p.y += p.speedY;
      p.opacity += p.opacityDir;
      if(p.opacity<=0.04||p.opacity>=0.55) p.opacityDir*=-1;
      if(p.y<-10){
        p.y=canvas.height+10;
        p.x=Math.random()*canvas.width;
      }
      if(p.x<-10) p.x=canvas.width+10;
      if(p.x>canvas.width+10) p.x=-10;

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color+p.opacity+')';
      ctx.fill();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ═══════════════════════════════════════
   DYNAMIC TEXT ROTATOR
   ═══════════════════════════════════════ */
(function(){
  var texts = document.querySelectorAll('#dynamic-band .dynamic-text');
  var current = 0;
  var interval = 1400;

  setInterval(function(){
    texts[current].classList.remove('active');
    texts[current].classList.add('exit');
    var prev = current;
    current = (current+1)%texts.length;
    texts[current].classList.remove('exit');
    texts[current].classList.add('active');
    setTimeout(function(){
      texts[prev].classList.remove('exit');
    },500);
  }, interval);
})();

/* ═══════════════════════════════════════
   LASER PROGRESS & PORTAL EXIT REDIRECT
   ═══════════════════════════════════════ */
(function(){
  var laser = document.getElementById('laser');
  var pctLabel = document.getElementById('pct-label');
  var exitFlash = document.getElementById('exit-flash');
  var exitOverlay = document.getElementById('exit-overlay');
  var DURATION = 4000;
  var REDIRECT = '../giri_yap_login/code.html';
  var start = null;
  var done = false;

  function doRedirect(){
    if(done) return;
    done = true;

    // 1. Flash the center
    try{ exitFlash.classList.add('active'); }catch(e){}

    // 2. Portal exit animation
    try{ document.body.classList.add('splash-exit'); }catch(e){}

    // 3. Fade to dark overlay then redirect
    setTimeout(function(){
      try{ exitOverlay.classList.add('active'); }catch(e){}
    }, 400);

    setTimeout(function(){
      window.location.href = REDIRECT;
    }, 900);
  }

  function easeInOut(t){
    return t<0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  function tick(ts){
    if(!start) start=ts;
    var raw = Math.min((ts-start)/DURATION,1);
    var eased = easeInOut(raw);
    var pct = Math.round(eased*100);

    laser.style.width = (eased*100)+'%';
    pctLabel.textContent = pct+'%';

    // Intensify glow trail as progress increases
    var g = 0.4 + eased*0.6;
    laser.style.boxShadow =
      '0 0 '+(8+eased*14)+'px rgba(139,92,246,'+g+'), '+
      '0 0 '+(20+eased*24)+'px rgba(34,211,238,'+(g*0.45)+')';

    if(raw<1){
      requestAnimationFrame(tick);
    } else {
      pctLabel.textContent='100%';
      doRedirect();
    }
  }

  // Start progress after entry animations settle
  setTimeout(function(){
    requestAnimationFrame(tick);
  },2000);

  // Failsafe: guarantee redirect even if animation fails
  setTimeout(function(){
    doRedirect();
  }, 8000);
})();

   GLOBAL PERSISTENCE GUARD
   ═══════════════════════════════════════ */

  // Splash is pre-auth — don't touch localStorage
  // Preserve existing lang setting (no-op)
})();
</script>
